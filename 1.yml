services:

  # ───────────────────────────────────────────────────────────────────────────
  # Traefik
  # ───────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:${TRAEFIK_VERSION}
    restart: always

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--entrypoints.websecure.address=:443"

      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"

      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./data/traefik:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

    labels:
      - traefik.enable=true

      # Dashboard
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN_NAME}`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=mytlschallenge

      # Dashboard auth
      - traefik.http.routers.traefik.middlewares=auth
      - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}


  # ───────────────────────────────────────────────────────────────────────────
  # n8n
  # ───────────────────────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    restart: always

    ports:
      - "127.0.0.1:5678:5678"

    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https

      - NODE_ENV=production

      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - N8N_EDITOR_BASE_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}

      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}

      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL}
      - N8N_LOG_OUTPUT=${N8N_LOG_OUTPUT}

      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED}
      - N8N_PERSONALIZATION_ENABLED=${N8N_PERSONALIZATION_ENABLED}
      - N8N_DISABLE_PRODUCTION_MAIN_MENU=${N8N_DISABLE_PRODUCTION_MAIN_MENU}

    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./local-files:/files

    labels:
      - traefik.enable=true

      - traefik.http.routers.n8n.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=mytlschallenge

      - traefik.http.middlewares.n8n.headers.SSLRedirect=true
      - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
      - traefik.http.middlewares.n8n.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.n8n.headers.STSPreload=true

      - traefik.http.routers.n8n.middlewares=n8n@docker


  # ───────────────────────────────────────────────────────────────────────────
  # Watch App
  # ───────────────────────────────────────────────────────────────────────────
  watch-app:
    image: watch-app
    restart: always

    expose:
      - "8000"

    labels:
      - traefik.enable=true

      - traefik.http.routers.watch-app.rule=Host(`youtube.deepaksingh.space`)
      - traefik.http.routers.watch-app.entrypoints=websecure
      - traefik.http.routers.watch-app.tls.certresolver=mytlschallenge

      - traefik.http.services.watch-app.loadbalancer.server.port=8000


  # ───────────────────────────────────────────────────────────────────────────
  # FileShareX PostgreSQL
  # ───────────────────────────────────────────────────────────────────────────
  fileshare-db:
    image: postgres:15-alpine
    restart: always

    environment:
      POSTGRES_DB: fileshare
      POSTGRES_USER: fileshare
      POSTGRES_PASSWORD: Deepak#singh@123

    volumes:
      - fileshare_postgres:/var/lib/postgresql/data/

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ───────────────────────────────────────────────────────────────────────────
  # FileShareX Redis
  # ───────────────────────────────────────────────────────────────────────────
  fileshare-redis:
    image: redis:7-alpine
    restart: always

    volumes:
      - fileshare_redis:/data


  # ───────────────────────────────────────────────────────────────────────────
  # FileShareX Django
  # ───────────────────────────────────────────────────────────────────────────
  fileshare-web:
    build: /root/FileShareX
    restart: always

    env_file:
      - /root/FileShareX/.env

    expose:
      - "8000"

    volumes:
      - fileshare_static:/app/staticfiles
      - fileshare_media:/app/media

    depends_on:
      fileshare-db:
        condition: service_healthy

      fileshare-redis:
        condition: service_started


  # ───────────────────────────────────────────────────────────────────────────
  # FileShareX Nginx
  # ───────────────────────────────────────────────────────────────────────────
  fileshare-nginx:
    image: nginx:1.25-alpine
    restart: always

    expose:
      - "80"

    volumes:
      - /root/FileShareX/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

      - fileshare_static:/app/staticfiles:ro
      - fileshare_media:/app/media:ro

    depends_on:
      - fileshare-web

    labels:
      - traefik.enable=true

      - traefik.http.routers.fileshare.rule=Host(`filesharex.deepaksingh.space`)
      - traefik.http.routers.fileshare.entrypoints=websecure
      - traefik.http.routers.fileshare.tls.certresolver=mytlschallenge

      - traefik.http.services.fileshare.loadbalancer.server.port=80


volumes:
  fileshare_postgres:
  fileshare_redis:
  fileshare_static:
  fileshare_media: