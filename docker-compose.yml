version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-fileshare}
      POSTGRES_USER: ${DB_USER:-fileshare}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fileshare} -d ${DB_NAME:-fileshare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (session cache + Celery broker) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django (Gunicorn) ─────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx (reverse proxy + static / media) ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.fileshare.rule=Host(`filesharex.deepaksingh.space`)
      - traefik.http.routers.fileshare.entrypoints=websecure
      - traefik.http.routers.fileshare.tls.certresolver=mytlschallenge
      - traefik.http.services.fileshare.loadbalancer.server.port=80

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
