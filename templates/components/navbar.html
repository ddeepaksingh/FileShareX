{% load static %}
<nav class="navbar">
    <div class="nav-inner">
        <a href="{% url 'accounts:dashboard' %}" class="nav-brand">FileShareX</a>

        <!-- Desktop links -->
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:dashboard' %}" class="nav-link">Dashboard</a>
                <a href="{% url 'files:my_files' %}" class="nav-link">My Files</a>
                <a href="{% url 'accounts:profile' %}" class="nav-link">{{ user.username }}</a>
                <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
                    {% csrf_token %}
                    <button type="submit" class="nav-logout-btn">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="nav-link">Login</a>
                <a href="{% url 'accounts:signup' %}" class="nav-signup-btn">Sign Up</a>
            {% endif %}
        </div>

        <!-- Hamburger (mobile) -->
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- Mobile dropdown -->
    <div class="nav-mobile" id="nav-mobile">
        {% if user.is_authenticated %}
            <a href="{% url 'accounts:dashboard' %}" class="nav-link">Dashboard</a>
            <a href="{% url 'files:my_files' %}" class="nav-link">My Files</a>
            <a href="{% url 'accounts:profile' %}" class="nav-link">{{ user.username }}</a>
            <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="nav-logout-btn">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'accounts:login' %}" class="nav-link">Login</a>
            <a href="{% url 'accounts:signup' %}" class="nav-signup-btn">Sign Up</a>
        {% endif %}
    </div>
</nav>
