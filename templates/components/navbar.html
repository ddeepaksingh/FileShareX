{% load static %}
<nav style="background:#1e40af;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;">
    <a href="{% url 'accounts:dashboard' %}" style="color:white;font-weight:bold;font-size:1.2rem;text-decoration:none;">
        FileShareX
    </a>

    <div style="display:flex;gap:16px;align-items:center;">
        {% if user.is_authenticated %}
            <a href="{% url 'accounts:dashboard' %}" style="color:#bfdbfe;text-decoration:none;">Dashboard</a>
            <a href="{% url 'accounts:profile' %}" style="color:#bfdbfe;text-decoration:none;">{{ user.username }}</a>
            <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
                {% csrf_token %}
                <button type="submit" style="background:#ef4444;color:white;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;">
                    Logout
                </button>
            </form>
        {% else %}
            <a href="{% url 'accounts:login' %}" style="color:#bfdbfe;text-decoration:none;">Login</a>
            <a href="{% url 'accounts:signup' %}" style="background:white;color:#1e40af;padding:6px 14px;border-radius:4px;text-decoration:none;font-weight:bold;">
                Sign Up
            </a>
        {% endif %}
    </div>
</nav>
