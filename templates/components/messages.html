{% if messages %}
<div style="max-width:600px;margin:16px auto;padding:0 16px;">
    {% for message in messages %}
    <div style="padding:12px 16px;border-radius:6px;margin-bottom:8px;
        {% if message.tags == 'success' %}background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;
        {% elif message.tags == 'error' %}background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;
        {% elif message.tags == 'warning' %}background:#fef3c7;color:#92400e;border:1px solid #fcd34d;
        {% else %}background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
