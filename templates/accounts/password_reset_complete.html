{% extends "base.html" %}
{% block title %}Password Reset Complete — FileShareX{% endblock %}

{% block content %}
<div style="max-width:440px;margin:60px auto;background:white;padding:32px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);text-align:center;">
    <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
    <h1 style="font-size:1.5rem;color:#111827;margin-bottom:8px;">Password reset complete</h1>
    <p style="color:#6b7280;margin-bottom:24px;">Your password has been set. You can now log in.</p>
    <a href="{% url 'accounts:login' %}" style="background:#1e40af;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;">
        Log in
    </a>
</div>
{% endblock %}
