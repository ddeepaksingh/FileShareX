{% extends "base.html" %}
{% block title %}Check Your Email — FileShareX{% endblock %}

{% block content %}
<div style="max-width:440px;margin:60px auto;background:white;padding:32px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);text-align:center;">
    <div style="font-size:3rem;margin-bottom:16px;">📧</div>
    <h1 style="font-size:1.5rem;color:#111827;margin-bottom:8px;">Check your inbox</h1>
    <p style="color:#6b7280;margin-bottom:24px;">
        If an account with that email exists, we've sent a password reset link.
        Check your spam folder if you don't see it.
    </p>
    <a href="{% url 'accounts:login' %}" style="color:#1e40af;font-size:.875rem;">Back to login</a>
</div>
{% endblock %}
