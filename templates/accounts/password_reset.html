{% extends "base.html" %}
{% block title %}Reset Password — FileShareX{% endblock %}

{% block content %}
<div style="max-width:440px;margin:60px auto;background:white;padding:32px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);">
    <h1 style="margin:0 0 8px;font-size:1.5rem;color:#111827;">Reset your password</h1>
    <p style="color:#6b7280;font-size:.875rem;margin-bottom:24px;">
        Enter your email and we'll send you a reset link.
    </p>

    <form method="post" novalidate>
        {% csrf_token %}
        <div style="margin-bottom:20px;">
            <label style="display:block;font-size:.875rem;font-weight:500;color:#374151;margin-bottom:4px;">Email address</label>
            {{ form.email }}
        </div>
        <button type="submit" style="width:100%;background:#1e40af;color:white;padding:10px;border:none;border-radius:6px;font-size:1rem;cursor:pointer;">
            Send reset link
        </button>
    </form>

    <p style="text-align:center;margin-top:16px;">
        <a href="{% url 'accounts:login' %}" style="font-size:.875rem;color:#6b7280;">Back to login</a>
    </p>
</div>
{% endblock %}
